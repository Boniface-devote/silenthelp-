name: silenthelp
description: "SilentHelp - Communication & Emergency app for the Deaf community"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  go_router: ^14.3.0
  flutter_riverpod: ^2.6.0
  easy_localization: ^3.0.8
  intl: ^0.20.2
  geolocator: ^14.0.2
  permission_handler: ^11.3.1
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  another_telephony: ^0.4.1
  sms_sender: ^1.0.6
  pretty_qr_code: ^3.6.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true
  assets:
    - assets/translations/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12