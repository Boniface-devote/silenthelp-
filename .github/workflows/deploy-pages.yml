name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Stamp web cache version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('web/service-worker.js')
          text = path.read_text()
          text = text.replace('__CACHE_VERSION__', '${{ github.run_number }}')
          path.write_text(text)
          PY
          touch .nojekyll

      - name: Build web app
        run: |
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --pwa-strategy none
          cp .nojekyll build/web/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
